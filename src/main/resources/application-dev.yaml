spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wedservice?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:wed_user}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh

app:
  security:
    jwt:
      secret: ${JWT_SECRET:wedservice-local-dev-secret-key-change-before-production}
      expiration: ${JWT_EXPIRATION:86400000}
